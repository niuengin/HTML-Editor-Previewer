<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>本地 HTML 编辑预览器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e1e;
      color: #fff;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .toolbar {
      height: 42px;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      flex-shrink: 0;
    }

    .toolbar button,
    .toolbar label {
      background: #3c3c3c;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .toolbar button:hover,
    .toolbar label:hover {
      background: #505050;
    }

    .toolbar input[type="file"] {
      display: none;
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
      width: 100%;
    }

    .panel {
      height: 100%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
      flex-shrink: 0;
      overflow: hidden;
    }

    .editor-panel {
      flex-basis: 50%;
    }

    .preview-panel {
      flex-basis: 50%;
      border-right: none;
    }

    .panel-header {
      height: 32px;
      background: #2d2d2d;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-size: 13px;
      color: #ddd;
      flex-shrink: 0;
    }

    .panel-header button {
      background: transparent;
      color: #ccc;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 6px;
    }

    .panel-header button:hover {
      color: #fff;
      background: #3c3c3c;
      border-radius: 3px;
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
    }

    #preview {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .panel.collapsed {
      flex-basis: 0 !important;
      width: 0 !important;
      min-width: 0 !important;
      border-right: none;
      overflow: hidden;
    }

    .panel.collapsed .panel-header,
    .panel.collapsed .panel-body {
      display: none;
    }

    .resizer {
      width: 6px;
      height: 100%;
      background: #2d2d2d;
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .resizer:hover {
      background: #007acc;
    }

    .resizer::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 0;
      width: 2px;
      height: 100%;
      background: transparent;
    }

    .resizer:hover::after {
      background: rgba(255, 255, 255, 0.45);
    }

    body.resizing {
      cursor: col-resize;
      user-select: none;
    }

    body.resizing iframe {
      pointer-events: none;
    }

    .source-highlight {
      background: rgba(0, 122, 204, 0.35);
      border: 1px solid rgba(0, 122, 204, 0.9);
      box-sizing: border-box;
    }

    .status {
      margin-left: auto;
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }

    .collapsed-buttons {
      display: flex;
      gap: 8px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="toolbar">
      <label>
        导入 HTML 文件
        <input id="fileInput" type="file" accept=".html,.htm,text/html" />
      </label>

      <button id="downloadBtn">下载当前 HTML</button>
      <button id="formatBtn">格式化代码</button>
      <button id="mappingToggleBtn">预览定位：开</button>

      <div class="collapsed-buttons">
        <button id="showEditorBtn" class="hidden">展开代码区</button>
        <button id="showPreviewBtn" class="hidden">展开预览区</button>
      </div>

      <div class="status" id="status">就绪</div>
    </div>

    <div class="main" id="main">
      <section class="panel editor-panel" id="editorPanel">
        <div class="panel-header">
          <span>HTML 代码</span>
          <button id="hideEditorBtn">收起</button>
        </div>
        <div class="panel-body">
          <div id="editor"></div>
        </div>
      </section>

      <div class="resizer" id="resizer"></div>

      <section class="panel preview-panel" id="previewPanel">
        <div class="panel-header">
          <span>实时预览</span>
          <button id="hidePreviewBtn">收起</button>
        </div>
        <div class="panel-body">
          <iframe id="preview" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.49.0/min/vs/loader.js"></script>

  <script>
    let editor;
    let currentSourceMap = {};
    let activeDecorations = [];
    let mappingEnabled = true;

    const defaultCode = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>实时预览示例</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }

    h1 {
      color: #2563eb;
    }

    .card {
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    button {
      padding: 8px 14px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello Monaco Editor</h1>
    <p>左侧编辑 HTML，右侧会实时预览。</p>
    <button onclick="alert('Hello')">点击测试 JS</button>
  </div>
</body>
</html>`;

    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const statusEl = document.getElementById("status");

    const main = document.getElementById("main");
    const editorPanel = document.getElementById("editorPanel");
    const previewPanel = document.getElementById("previewPanel");
    const resizer = document.getElementById("resizer");

    const hideEditorBtn = document.getElementById("hideEditorBtn");
    const hidePreviewBtn = document.getElementById("hidePreviewBtn");
    const showEditorBtn = document.getElementById("showEditorBtn");
    const showPreviewBtn = document.getElementById("showPreviewBtn");

    const downloadBtn = document.getElementById("downloadBtn");
    const formatBtn = document.getElementById("formatBtn");
    const mappingToggleBtn = document.getElementById("mappingToggleBtn");

    let isResizing = false;
    let lastEditorBasis = "50%";
    let lastPreviewBasis = "50%";

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function layoutEditor() {
      if (editor) {
        editor.layout();
      }
    }

    function debounce(fn, delay = 300) {
      let timer = null;

      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => {
          fn.apply(this, args);
        }, delay);
      };
    }

    function findTagEnd(source, startIndex) {
      let quote = null;

      for (let i = startIndex; i < source.length; i++) {
        const char = source[i];

        if (quote) {
          if (char === quote && source[i - 1] !== "\\") {
            quote = null;
          }

          continue;
        }

        if (char === '"' || char === "'") {
          quote = char;
          continue;
        }

        if (char === ">") {
          return i;
        }
      }

      return -1;
    }

    function appendPreviewBridge(html) {
      const bridge = `
<script>
(function () {
  var lastTarget = null;

  function clearLastTarget() {
    if (lastTarget) {
      lastTarget.style.outline = "";
      lastTarget.style.outlineOffset = "";
      lastTarget = null;
    }
  }

  document.addEventListener("click", function (event) {
    var target = event.target.closest && event.target.closest("[data-source-id]");

    if (!target) {
      return;
    }

    event.preventDefault();
    event.stopPropagation();

    clearLastTarget();

    target.style.outline = "2px solid #007acc";
    target.style.outlineOffset = "2px";
    lastTarget = target;

    window.parent.postMessage({
      type: "preview-source-click",
      sourceId: target.getAttribute("data-source-id")
    }, "*");
  }, true);
})();
<\/script>`;

      if (/<\/body\s*>/i.test(html)) {
        return html.replace(/<\/body\s*>/i, bridge + "\n</body>");
      }

      if (/<\/html\s*>/i.test(html)) {
        return html.replace(/<\/html\s*>/i, bridge + "\n</html>");
      }

      return html + bridge;
    }

    function instrumentHtml(source) {
      const sourceMap = {};
      const rawTextTags = new Set(["script", "style", "textarea", "title"]);
      let html = "";
      let position = 0;
      let counter = 1;

      while (position < source.length) {
        const tagStart = source.indexOf("<", position);

        if (tagStart === -1) {
          html += source.slice(position);
          break;
        }

        html += source.slice(position, tagStart);

        const rest = source.slice(tagStart);

        if (
          rest.startsWith("<!--") ||
          rest.startsWith("<!") ||
          rest.startsWith("</") ||
          rest.startsWith("<?")
        ) {
          const tagEnd = findTagEnd(source, tagStart + 1);

          if (tagEnd === -1) {
            html += source.slice(tagStart);
            break;
          }

          html += source.slice(tagStart, tagEnd + 1);
          position = tagEnd + 1;
          continue;
        }

        const tagMatch = source.slice(tagStart + 1).match(/^\s*([A-Za-z][\w:-]*)/);

        if (!tagMatch) {
          html += source[tagStart];
          position = tagStart + 1;
          continue;
        }

        const tagName = tagMatch[1];
        const lowerTagName = tagName.toLowerCase();
        const tagEnd = findTagEnd(source, tagStart + 1);

        if (tagEnd === -1) {
          html += source.slice(tagStart);
          break;
        }

        const sourceId = "source-node-" + counter++;
        const model = editor && editor.getModel();
        const startPosition = model
          ? model.getPositionAt(tagStart)
          : { lineNumber: 1, column: 1 };

        sourceMap[sourceId] = {
          index: tagStart,
          lineNumber: startPosition.lineNumber,
          column: startPosition.column,
          tagName
        };

        const insertIndex = source[tagEnd - 1] === "/" ? tagEnd - 1 : tagEnd;

        html +=
          source.slice(tagStart, insertIndex) +
          ' data-source-id="' +
          sourceId +
          '"' +
          source.slice(insertIndex, tagEnd + 1);

        position = tagEnd + 1;

        if (rawTextTags.has(lowerTagName)) {
          const lowerSource = source.toLowerCase();
          const closingStart = lowerSource.indexOf("</" + lowerTagName, position);

          if (closingStart !== -1) {
            const closingEnd = findTagEnd(source, closingStart + 2);

            if (closingEnd !== -1) {
              html += source.slice(position, closingEnd + 1);
              position = closingEnd + 1;
            }
          }
        }
      }

      return {
        html: appendPreviewBridge(html),
        sourceMap
      };
    }

    function updatePreview() {
      if (!editor) return;

      const code = editor.getValue();

      if (!mappingEnabled) {
        currentSourceMap = {};
        activeDecorations = editor.deltaDecorations(activeDecorations, []);
        preview.srcdoc = code;
        setStatus("已更新预览，预览定位已关闭 " + new Date().toLocaleTimeString());
        return;
      }

      const result = instrumentHtml(code);

      currentSourceMap = result.sourceMap;
      preview.srcdoc = result.html;

      setStatus("已更新预览，预览定位已开启 " + new Date().toLocaleTimeString());
    }

    function jumpToSource(sourceId) {
      if (!editor || !currentSourceMap[sourceId]) return;

      const source = currentSourceMap[sourceId];

      if (editorPanel.classList.contains("collapsed")) {
        editorPanel.classList.remove("collapsed");
        showEditorBtn.classList.add("hidden");

        if (!previewPanel.classList.contains("collapsed")) {
          editorPanel.style.flexBasis = lastEditorBasis || "50%";
          previewPanel.style.flexBasis = lastPreviewBasis || "50%";
        }

        updateResizerVisible();
      }

      const position = {
        lineNumber: source.lineNumber,
        column: source.column
      };

      editor.setPosition(position);
      editor.revealLineInCenter(source.lineNumber);
      editor.focus();

      activeDecorations = editor.deltaDecorations(activeDecorations, [
        {
          range: new monaco.Range(
            source.lineNumber,
            source.column,
            source.lineNumber,
            source.column + source.tagName.length + 1
          ),
          options: {
            className: "source-highlight",
            isWholeLine: false
          }
        }
      ]);

      setStatus("已定位到 <" + source.tagName + "> 第 " + source.lineNumber + " 行");
    }

    const debouncedUpdatePreview = debounce(updatePreview, 300);

    require.config({
      paths: {
        vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.49.0/min/vs"
      }
    });

    require(["vs/editor/editor.main"], function () {
      editor = monaco.editor.create(document.getElementById("editor"), {
        value: defaultCode,
        language: "html",
        theme: "vs-dark",
        automaticLayout: true,
        minimap: {
          enabled: true
        },
        fontSize: 14,
        fontFamily: "Consolas, 'Courier New', monospace",
        lineNumbers: "on",
        roundedSelection: false,
        scrollBeyondLastLine: false,
        wordWrap: "on",
        tabSize: 2,
        insertSpaces: true,
        formatOnPaste: true,
        formatOnType: true,
        autoClosingBrackets: "always",
        autoClosingQuotes: "always",
        autoIndent: "full",
        cursorBlinking: "blink",
        cursorSmoothCaretAnimation: "on",
        smoothScrolling: true,
        mouseWheelZoom: true,
        bracketPairColorization: {
          enabled: true
        },
        guides: {
          bracketPairs: true,
          indentation: true
        },
        suggestOnTriggerCharacters: true,
        quickSuggestions: true,
        folding: true,
        links: true
      });

      editor.onDidChangeModelContent(() => {
        activeDecorations = editor.deltaDecorations(activeDecorations, []);
        debouncedUpdatePreview();
      });

      updatePreview();
      setStatus("编辑器已加载");
    });

    window.addEventListener("message", function (event) {
      if (!mappingEnabled) return;
      if (event.source !== preview.contentWindow) return;

      const data = event.data;

      if (!data || data.type !== "preview-source-click") return;

      jumpToSource(data.sourceId);
    });

    fileInput.addEventListener("change", function () {
      const file = this.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        const content = e.target.result;

        if (editor) {
          editor.setValue(content);
          updatePreview();
          setStatus("已导入：" + file.name);
        }
      };

      reader.onerror = function () {
        setStatus("文件读取失败");
      };

      reader.readAsText(file, "UTF-8");
    });

    function updateResizerVisible() {
      const editorCollapsed = editorPanel.classList.contains("collapsed");
      const previewCollapsed = previewPanel.classList.contains("collapsed");

      resizer.style.display = editorCollapsed || previewCollapsed ? "none" : "block";
    }

    function rememberCurrentBasis() {
      if (
        !editorPanel.classList.contains("collapsed") &&
        !previewPanel.classList.contains("collapsed")
      ) {
        lastEditorBasis = editorPanel.style.flexBasis || "50%";
        lastPreviewBasis = previewPanel.style.flexBasis || "50%";
      }
    }

    resizer.addEventListener("mousedown", function (e) {
      if (
        editorPanel.classList.contains("collapsed") ||
        previewPanel.classList.contains("collapsed")
      ) {
        return;
      }

      isResizing = true;
      document.body.classList.add("resizing");
      e.preventDefault();
    });

    document.addEventListener("mousemove", function (e) {
      if (!isResizing) return;

      const mainRect = main.getBoundingClientRect();
      const resizerWidth = resizer.offsetWidth;

      let leftWidth = e.clientX - mainRect.left;
      let rightWidth = mainRect.width - leftWidth - resizerWidth;

      const minWidth = 200;

      if (leftWidth < minWidth) {
        leftWidth = minWidth;
        rightWidth = mainRect.width - leftWidth - resizerWidth;
      }

      if (rightWidth < minWidth) {
        rightWidth = minWidth;
        leftWidth = mainRect.width - rightWidth - resizerWidth;
      }

      const usableWidth = mainRect.width - resizerWidth;
      const leftPercent = (leftWidth / usableWidth) * 100;
      const rightPercent = (rightWidth / usableWidth) * 100;

      editorPanel.style.flexBasis = leftPercent + "%";
      previewPanel.style.flexBasis = rightPercent + "%";

      lastEditorBasis = editorPanel.style.flexBasis;
      lastPreviewBasis = previewPanel.style.flexBasis;

      layoutEditor();
    });

    document.addEventListener("mouseup", function () {
      if (!isResizing) return;

      isResizing = false;
      document.body.classList.remove("resizing");
      layoutEditor();
    });

    hideEditorBtn.addEventListener("click", function () {
      rememberCurrentBasis();

      editorPanel.classList.add("collapsed");
      showEditorBtn.classList.remove("hidden");

      previewPanel.style.flexBasis = "100%";
      updateResizerVisible();

      setTimeout(layoutEditor, 50);
    });

    showEditorBtn.addEventListener("click", function () {
      editorPanel.classList.remove("collapsed");
      showEditorBtn.classList.add("hidden");

      if (!previewPanel.classList.contains("collapsed")) {
        editorPanel.style.flexBasis = lastEditorBasis || "50%";
        previewPanel.style.flexBasis = lastPreviewBasis || "50%";
      } else {
        editorPanel.style.flexBasis = "100%";
      }

      updateResizerVisible();

      setTimeout(layoutEditor, 50);
    });

    hidePreviewBtn.addEventListener("click", function () {
      rememberCurrentBasis();

      previewPanel.classList.add("collapsed");
      showPreviewBtn.classList.remove("hidden");

      editorPanel.style.flexBasis = "100%";
      updateResizerVisible();

      setTimeout(layoutEditor, 50);
    });

    showPreviewBtn.addEventListener("click", function () {
      previewPanel.classList.remove("collapsed");
      showPreviewBtn.classList.add("hidden");

      if (!editorPanel.classList.contains("collapsed")) {
        editorPanel.style.flexBasis = lastEditorBasis || "50%";
        previewPanel.style.flexBasis = lastPreviewBasis || "50%";
      } else {
        previewPanel.style.flexBasis = "100%";
      }

      updateResizerVisible();

      setTimeout(layoutEditor, 50);
    });

    downloadBtn.addEventListener("click", function () {
      if (!editor) return;

      const code = editor.getValue();
      const blob = new Blob([code], {
        type: "text/html;charset=utf-8"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = "index.html";
      a.click();

      URL.revokeObjectURL(url);

      setStatus("已下载 HTML 文件");
    });

    formatBtn.addEventListener("click", async function () {
      if (!editor) return;

      try {
        await editor.getAction("editor.action.formatDocument").run();
        updatePreview();
        setStatus("代码已格式化");
      } catch (err) {
        setStatus("格式化失败");
        console.error(err);
      }
    });

    mappingToggleBtn.addEventListener("click", function () {
      mappingEnabled = !mappingEnabled;

      mappingToggleBtn.textContent = mappingEnabled
        ? "预览定位：开"
        : "预览定位：关";

      if (!mappingEnabled && editor) {
        currentSourceMap = {};
        activeDecorations = editor.deltaDecorations(activeDecorations, []);
      }

      updatePreview();
    });

    window.addEventListener("resize", function () {
      layoutEditor();
    });
  </script>
</body>

</html>
